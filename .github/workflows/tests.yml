name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: agents/social/package-lock.json
      - run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - run: npm ci --prefix agents/social
      - run: make lint
      - run: make test
